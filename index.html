<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ely Chaves</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%}
    body{
      font-family:'DM Sans',sans-serif;
      background:#0a0a0a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      overflow:hidden;
      position:relative;
    }

    /* Fundo com logo enorme e desfocada */
    .bg-logo{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      z-index:0;
    }
    .bg-logo img{
      width:80vmin;
      height:80vmin;
      object-fit:contain;
      opacity:0.07;
      filter:blur(1px) grayscale(30%);
      user-select:none;
    }

    /* Conteúdo central */
    .center{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0;
    }

    /* Logo visível acima dos botões */
    .logo-visible{
      width:200px;
      height:200px;
      object-fit:contain;
      opacity:0.92;
      margin-bottom:36px;
      filter:drop-shadow(0 8px 32px rgba(34,197,94,0.18));
    }

    /* Nome da instituição */
    .inst-name{
      font-family:'Cormorant Garamond',serif;
      font-size:28px;
      font-weight:700;
      color:#fff;
      letter-spacing:0.5px;
      text-align:center;
      margin-bottom:6px;
      text-shadow:0 2px 16px rgba(0,0,0,0.6);
    }
    .inst-sub{
      font-size:11px;
      font-weight:700;
      letter-spacing:3px;
      text-transform:uppercase;
      color:rgba(255,255,255,0.38);
      text-align:center;
      margin-bottom:48px;
    }

    /* Botões */
    .btn-group{
      display:flex;
      flex-direction:column;
      gap:14px;
      width:320px;
    }
    .btn{
      border:0;
      border-radius:14px;
      height:58px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .2s ease, background .2s ease, opacity .2s;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-family:inherit;
      width:100%;
      letter-spacing:0.3px;
    }
    .btn:hover{transform:translateY(-2px);}
    .btn:active{transform:translateY(0);}

    .btn-primary{
      background:linear-gradient(135deg,#16a34a 0%,#15803d 100%);
      color:#fff;
      box-shadow:0 12px 28px rgba(22,163,74,0.32);
    }
    .btn-primary:hover{
      box-shadow:0 16px 36px rgba(22,163,74,0.44);
    }

    .btn-secondary{
      background:rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.82);
      border:1px solid rgba(255,255,255,0.14);
      backdrop-filter:blur(4px);
    }
    .btn-secondary:hover{
      background:rgba(255,255,255,0.10);
    }

    /* Status */
    .status{
      margin-top:20px;
      color:rgba(255,255,255,0.55);
      font-size:13px;
      text-align:center;
      min-height:18px;
      width:320px;
      line-height:1.5;
    }

    /* Input de arquivo oculto */
    .hidden{display:none !important}

    @media(max-width:480px){
      .btn-group,.status{width:90vw}
      .logo-visible{width:150px;height:150px;margin-bottom:28px}
      .inst-name{font-size:22px}
    }
  </style>

</head>
<body>

  <!-- Logo de fundo desfocada -->
  <div class="bg-logo">
    <img src="ELY_CHAVES.png" alt="">
  </div>

  <!-- Conteúdo central -->
  <div class="center">
    <img class="logo-visible" src="ELY_CHAVES.png" alt="Logo Instituto Dr. Ely Chaves">
    <div class="inst-name">Instituto Dr. Ely Chaves</div>
    <div class="inst-sub">Registro de Paciente</div>

    <div class="btn-group">
      <button class="btn btn-primary" id="btnPreencher" type="button">→&nbsp; Ir para o Sistema</button>
    </div>

    <div class="status" id="statusMsg"></div>
  </div>

  <!-- Campos ocultos necessários para o JS funcionar -->
  <div class="hidden">
    <input id="nome" type="text">
    <input id="nascimento" type="date">
    <input id="sus" type="text">
    <input id="telefone" type="tel">
    <input id="data_coleta" type="date">
    <input id="cep" type="text">
    <input id="cidade" type="text">
    <input id="endereco" type="text">
    <input id="bairro" type="text">
    <div id="numExame"></div>
    <div id="anoTopo"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const campos = {
      nome: $('nome'),
      nascimento: $('nascimento'),
      sus: $('sus'),
      telefone: $('telefone'),
      data_coleta: $('data_coleta'),
      cep: $('cep'),
      cidade: $('cidade'),
      endereco: $('endereco'),
      bairro: $('bairro')
    };

    $('anoTopo').textContent = new Date().getFullYear();

    function normalizarDataBRParaISO(v){
      if(!v) return '';
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
      const m = String(v).match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      return m ? `${m[3]}-${m[2]}-${m[1]}` : '';
    }

    function apenasDigitos(v){
      return String(v || '').replace(/\D+/g, '');
    }

    function paraMaiusculas(v){
      return String(v || '').toUpperCase().trim();
    }

    function aplicarMascaraTelefone(v){
      const n = apenasDigitos(v).slice(0,11);
      if (n.length <= 10) {
        return n.replace(/^(\d{0,2})(\d{0,4})(\d{0,4}).*/, function(_,a,b,c){
          let s = '';
          if(a) s += '(' + a;
          if(a.length === 2) s += ') ';
          if(b) s += b;
          if(c) s += '-' + c;
          return s;
        });
      }
      return n.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
    }

    function aplicarMascaraCEP(v){
      const n = apenasDigitos(v).slice(0,8);
      return n.replace(/^(\d{5})(\d{0,3}).*/, function(_,a,b){ return b ? `${a}-${b}` : a; });
    }

    function aplicarMascaraSUS(v){
      const n = String(v || '').replace(/\D/g, '').slice(0, 15);
      return n
        .replace(/^(\d{3})(\d)/, '$1 $2')
        .replace(/^(\d{3}) (\d{4})(\d)/, '$1 $2 $3')
        .replace(/^(\d{3}) (\d{4}) (\d{4})(\d)/, '$1 $2 $3 $4');
    }

    function salvarRascunho(){
      const dados = {
        nome: campos.nome.value.trim(),
        nascimento: campos.nascimento.value,
        sus: campos.sus.value.trim(),
        telefone: campos.telefone.value.trim(),
        data_coleta: campos.data_coleta.value,
        cep: campos.cep.value.trim(),
        cidade: campos.cidade.value.trim(),
        endereco: campos.endereco.value.trim(),
        bairro: campos.bairro.value.trim()
      };
      sessionStorage.setItem('ely_tela_principal_rascunho', JSON.stringify(dados));
    }

    function carregarRascunho(){
      try {
        const bruto = sessionStorage.getItem('ely_tela_principal_rascunho');
        if(!bruto) return;
        const dados = JSON.parse(bruto);
        Object.keys(dados || {}).forEach((k) => {
          if (campos[k] && !campos[k].value) campos[k].value = dados[k] || '';
        });
      } catch(e) {}
    }

    function exibirStatus(msg){
      const box = $('statusMsg');
      box.textContent = msg;
      box.classList.add('show');
    }

    async function buscarCep(){
      const cep = apenasDigitos(campos.cep.value);
      if(cep.length !== 8) return;
      try{
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const json = await res.json();
        if(json.erro){
          exibirStatus('CEP não encontrado. Você pode continuar preenchendo manualmente.');
          return;
        }
        campos.cidade.value = paraMaiusculas([json.localidade, json.uf].filter(Boolean).join(' / '));
        campos.bairro.value = paraMaiusculas(json.bairro || '');
        if(!campos.endereco.value) campos.endereco.value = paraMaiusculas(json.logradouro || '');
        salvarRascunho();
      }catch(err){
        exibirStatus('Não foi possível consultar o CEP agora. Você pode continuar normalmente.');
      }
    }

    function atualizarNumeroExame(){
      const anoAtual = String(new Date().getFullYear());
      let seq = '0001';
      try{
        const bruto = localStorage.getItem('ely_seq_num');
        const ano = localStorage.getItem('ely_seq_ano');
        if(bruto && ano === anoAtual) seq = String(bruto).padStart(4, '0');
      }catch(e){}
      $('numExame').textContent = seq;
    }

    function importarCadsusSeExistir(){
      const bruto = localStorage.getItem('cadsus_pendente');
      if(!bruto) return;
      try{
        const pacote = JSON.parse(bruto);
        const dados = pacote && pacote.dados ? pacote.dados : pacote;
        if(!dados) return;
        campos.nome.value = dados.nome || campos.nome.value;
        campos.nascimento.value = normalizarDataBRParaISO(dados.nascimento || dados.dataNasc || campos.nascimento.value);
        campos.sus.value = aplicarMascaraSUS(dados.cartaoSus || dados.sus || campos.sus.value);
        campos.telefone.value = aplicarMascaraTelefone(dados.tel || dados.telefone || campos.telefone.value);
        exibirStatus('Dados importados. Revise e clique em “Preencher no Sistema”.');
        salvarRascunho();
      }catch(e){ }
    }

    function montarPacoteParaSistema(){
      return {
        dados: {
          nome: campos.nome.value.trim(),
          nascimento: campos.nascimento.value,
          cartaoSus: campos.sus.value.trim(),
          telefone: campos.telefone.value.trim(),
          cep: campos.cep.value.trim(),
          cidade: campos.cidade.value.trim(),
          endereco: campos.endereco.value.trim(),
          bairro: campos.bairro.value.trim(),
          data_coleta: campos.data_coleta.value
        },
        origem: 'tela_principal_ely',
        geradoEm: new Date().toISOString()
      };
    }

    function importarCadsusDaURL(){
      try{
        const params = new URLSearchParams(window.location.search);
        const nome = (params.get('nome') || '').trim();
        const sus = (params.get('sus') || '').replace(/\D+/g, '').slice(0, 15);
        if(!nome && !sus) return;
        campos.nome.value = nome ? paraMaiusculas(nome) : campos.nome.value;
        campos.sus.value = sus ? aplicarMascaraSUS(sus) : campos.sus.value;
        localStorage.setItem('cadsus_pendente', JSON.stringify({
          dados: { nome: nome, cartaoSus: sus },
          origem: 'querystring',
          geradoEm: new Date().toISOString()
        }));
        exibirStatus('Dados recebidos da extensão. Revise e clique em “Preencher no Sistema”.');
        salvarRascunho();
      }catch(e){}
    }

    window.addEventListener('elychaves:importar', (ev) => {
      const d = ev && ev.detail ? ev.detail : {};
      if (d.nome) campos.nome.value = paraMaiusculas(d.nome);
      if (d.cartaoSus || d.susFormatado) campos.sus.value = d.susFormatado || aplicarMascaraSUS(d.cartaoSus || '');
      salvarRascunho();
      exibirStatus('Dados recebidos da extensão. Revise e clique em “Preencher no Sistema”.');
    });


function abrirSistema(){
  // Entrada manual: sempre abre a tela principal limpa do sistema.
  // Não reaproveita importação antiga do CADSUS nem rascunho anterior.
  localStorage.removeItem('cadsus_pendente');
  sessionStorage.removeItem('ely_tela_principal_rascunho');
  localStorage.setItem('ely_abrir_tela_principal', '1');
  window.location.href = 'ely_chaves_sistema.html?abrir=principal';
}

// Importação direta de PDF do CADSUS removida por solicitação.
    campos.telefone.addEventListener('input', () => {
      campos.telefone.value = aplicarMascaraTelefone(campos.telefone.value);
      salvarRascunho();
    });
    campos.cep.addEventListener('input', () => {
      campos.cep.value = aplicarMascaraCEP(campos.cep.value);
      salvarRascunho();
    });
    campos.sus.addEventListener('input', () => {
      campos.sus.value = aplicarMascaraSUS(campos.sus.value);
      salvarRascunho();
    });

    Object.values(campos).forEach((el) => {
      if(!el) return;
      el.addEventListener('change', salvarRascunho);
      if (el !== campos.telefone && el !== campos.cep && el !== campos.sus) {
        el.addEventListener('input', () => {
          if (el === campos.nome || el === campos.cidade || el === campos.endereco || el === campos.bairro) {
            const pos = el.selectionStart;
            el.value = paraMaiusculas(el.value);
            try { el.setSelectionRange(pos, pos); } catch(e) {}
          }
          salvarRascunho();
        });
      }
    });

    campos.cep.addEventListener('blur', buscarCep);
    $('btnPreencher').addEventListener('click', abrirSistema);

    // ABERTURA LIMPA: ao abrir o index, nunca reaproveita paciente antigo.
    // Só haverá dados quando importar PDF/URL/extensão nesta sessão.
    sessionStorage.removeItem('ely_tela_principal_rascunho');
    localStorage.removeItem('cadsus_pendente');
    Object.values(campos).forEach(el => { if (el) el.value = ''; });

    atualizarNumeroExame();
    importarCadsusDaURL();
    importarCadsusSeExistir();
    if(!campos.nome.value.trim()) campos.nome.focus();

    // Remove cache/service worker antigo para evitar carregar versão velha do GitHub Pages.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(reg => reg.unregister())).catch(()=>{});
    }
    if (window.caches) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(()=>{});
    }
  </script>
</body>
</html>
