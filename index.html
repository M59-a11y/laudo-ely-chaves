    /* Logo visível acima dos botões */

      border:0;

  <script>
    const $ = (id) => document.getElementById(id);
    const campos = {
      nome: $('nome'),
      nascimento: $('nascimento'),
      sus: $('sus'),
      telefone: $('telefone'),
      data_coleta: $('data_coleta'),
      cep: $('cep'),
      cidade: $('cidade'),
      endereco: $('endereco'),
      bairro: $('bairro')
    };

    $('anoTopo').textContent = new Date().getFullYear();

    function normalizarDataBRParaISO(v){
      if(!v) return '';
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
      const m = String(v).match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      return m ? `${m[3]}-${m[2]}-${m[1]}` : '';
    }

    function apenasDigitos(v){
      return String(v || '').replace(/\D+/g, '');
    }

    function aplicarMascaraTelefone(v){
      const n = apenasDigitos(v).slice(0,11);
      if (n.length <= 10) {
        return n.replace(/^(\d{0,2})(\d{0,4})(\d{0,4}).*/, function(_,a,b,c){
          let s = '';
          if(a) s += '(' + a;
          if(a.length === 2) s += ') ';
          if(b) s += b;
          if(c) s += '-' + c;
          return s;
        });
      }
      return n.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
    }

    function aplicarMascaraCEP(v){
      const n = apenasDigitos(v).slice(0,8);
      return n.replace(/^(\d{5})(\d{0,3}).*/, function(_,a,b){ return b ? `${a}-${b}` : a; });
    }

    function aplicarMascaraSUS(v){
      const n = apenasDigitos(v).slice(0,15);
      return n.replace(/(\d{3})(?=\d)/g, '$1 ').trim();
    }

    function salvarRascunho(){
      const dados = {
        nome: campos.nome.value.trim(),
        nascimento: campos.nascimento.value,
        sus: campos.sus.value.trim(),
        telefone: campos.telefone.value.trim(),
        data_coleta: campos.data_coleta.value,
        cep: campos.cep.value.trim(),
        cidade: campos.cidade.value.trim(),
        endereco: campos.endereco.value.trim(),
        bairro: campos.bairro.value.trim()
      };
      sessionStorage.setItem('ely_tela_principal_rascunho', JSON.stringify(dados));
    }

    function carregarRascunho(){
      try {
        const bruto = sessionStorage.getItem('ely_tela_principal_rascunho');
        if(!bruto) return;
        const dados = JSON.parse(bruto);
        Object.keys(dados || {}).forEach((k) => {
          if (campos[k] && !campos[k].value) campos[k].value = dados[k] || '';
        });
      } catch(e) {}
    }

    function exibirStatus(msg){
      const box = $('statusMsg');
      box.textContent = msg;
      box.classList.add('show');
    }

    async function buscarCep(){
      const cep = apenasDigitos(campos.cep.value);
      if(cep.length !== 8) return;
      try{
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const json = await res.json();
        if(json.erro){
          exibirStatus('CEP não encontrado. Você pode continuar preenchendo manualmente.');
          return;
        }
        campos.cidade.value = [json.localidade, json.uf].filter(Boolean).join(' / ');
        campos.bairro.value = json.bairro || '';
        if(!campos.endereco.value) campos.endereco.value = json.logradouro || '';
        salvarRascunho();
      }catch(err){
        exibirStatus('Não foi possível consultar o CEP agora. Você pode continuar normalmente.');
      }
    }

    function atualizarNumeroExame(){
      const anoAtual = String(new Date().getFullYear());
      let seq = '0001';
      try{
        const bruto = localStorage.getItem('ely_seq_num');
        const ano = localStorage.getItem('ely_seq_ano');
        if(bruto && ano === anoAtual) seq = String(bruto).padStart(4, '0');
      }catch(e){}
      $('numExame').textContent = seq;
    }

    function importarCadsusSeExistir(){
      const bruto = localStorage.getItem('cadsus_pendente');
      if(!bruto) return;
      try{
        const pacote = JSON.parse(bruto);
        const dados = pacote && pacote.dados ? pacote.dados : pacote;
        if(!dados) return;
        campos.nome.value = dados.nome || campos.nome.value;
        campos.nascimento.value = normalizarDataBRParaISO(dados.nascimento || dados.dataNasc || campos.nascimento.value);
        campos.sus.value = dados.cartaoSus || dados.sus || campos.sus.value;
        campos.telefone.value = aplicarMascaraTelefone(dados.tel || dados.telefone || campos.telefone.value);
        exibirStatus('Dados importados. Revise e clique em “Preencher no Sistema”.');
        salvarRascunho();
      }catch(e){ }
    }

    function montarPacoteParaSistema(){
      return {
        dados: {
          nome: campos.nome.value.trim(),
          nascimento: campos.nascimento.value,
          cartaoSus: campos.sus.value.trim(),
          telefone: campos.telefone.value.trim(),
          cep: campos.cep.value.trim(),
          cidade: campos.cidade.value.trim(),
          endereco: campos.endereco.value.trim(),
          bairro: campos.bairro.value.trim(),
          data_coleta: campos.data_coleta.value
        },
        origem: 'tela_principal_ely',
        geradoEm: new Date().toISOString()
      };
    }


function abrirSistema(){
  localStorage.setItem('cadsus_pendente', JSON.stringify(montarPacoteParaSistema()));
  sessionStorage.removeItem('ely_tela_principal_rascunho');
  window.location.href = 'ely_chaves_sistema.html';
}

function setStatusImportacao(msg){
  exibirStatus(msg);

function converterDataParaISO(data){
  if(!data) return "";
  var p = String(data).match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(!p) return data;
  return p[3] + "-" + p[2] + "-" + p[1];
}

function limparValor(v){
  return (v || "")
    .replace(/\s{2,}/g, " ")
    .replace(/^[\s:;\-–—|]+/, "")
    .replace(/[\s:;\-–—|]+$/, "")
    .trim();
}

function removerLixoFim(v){
  return (v || "")
    .replace(/\b(Idade|Sexo|Feminino|Masculino|Cart[aã]o|CPF|CNS|SUS|Nascimento|Telefone|Fone|Celular|Contato|M[eê]dico|Procedimento|Quantidade|Natureza|Exame|Nome social|Nome do Pai|Pai|Ra[cç]a|Etnia|Nacionalidade|Pa[ií]s)\b.*$/i, "")
    .replace(/\s{2,}/g, " ")
    .trim();
}

function somenteNome(v){
  v = limparValor(v);
  v = removerLixoFim(v);
  v = v.replace(/[^A-Za-zÀ-ÿ\s]/g, " ").replace(/\s{2,}/g, " ").trim();
  return v;
}

function extrairEntreRotulos(texto, rotulosInicio, rotulosFim){
  for(const ini of rotulosInicio){
    const mIni = new RegExp(ini, "i").exec(texto);
    if(!mIni) continue;
    const restante = texto.slice(mIni.index + mIni[0].length);
    let menorFim = restante.length;
    for(const fim of rotulosFim){
      const mFim = new RegExp(fim, "i").exec(restante);
      if(mFim && mFim.index < menorFim) menorFim = mFim.index;
    }
    const valor = restante.slice(0, menorFim);
    if(valor && valor.trim()) return limparValor(valor);
  }
  return "";
}

function extrairNomePaciente(texto){

      "\\bNome\\s*:(?!\\s*(?:Social|da\\s*M[aã]e|do\\s*Pai|do\\s*Paciente|Logradouro))",
      "Nome\\s+do\\s+Paciente\\s*:?",
      "Paciente\\s*:?",
      "Usu[aá]rio\\s*:?"
    ],
    [
      "Nome\\s+Social\\s*:?",
      "Nome\\s+da\\s+M[aã]e\\s*:?",
      "Nome\\s+do\\s+Pai\\s*:?",
      "(?:Data\\s+de\\s+)?Nascimento\\s*:?",
      "CNS\\s*:?",
      "CPF\\s*:?",
      "Sexo\\s*:?",
      "Idade\\s*:?",
      "M[aã]e\\s*:?",
      "Cart[aã]o\\s+SUS\\s*:?",
      "Telefone\\s*:?",
      "Fone\\s*:?",
      "Celular\\s*:?",
      "Ra[cç]a\\s*:?",
      "Etnia\\s*:?",
      "Naturaliza"
    ]
  );

  nome = somenteNome(nome);
  if(nome && nome.split(" ").filter(Boolean).length >= 2) return nome;

  const m = texto.match(/\bNome\s*:\s*([A-ZÀÁÂÃÄÅÈÉÊËÌÍÎÏÒÓÔÕÖÙÚÛÜÝŸ][A-ZÀ-ÿa-z\s]{3,}?)(?=\s+(?:Nome\s+Social|CNS|CPF|Nascimento|Sexo|Ra[cç]a|Naturaliz|Nome\s+da\s+M[aã]e|Nome\s+do\s+Pai))/i);
  if(m){
    const n = somenteNome(m[1]);
    if(n) return n;
  }
  return nome;
}

function extrairNomeMae(texto){
  let mae = extrairEntreRotulos(
    texto,
    ["Nome\\s+da\\s+M[aã]e\\s*:?", "M[aã]e\\s*:?"],
    [
      "Nome\\s+do\\s+Pai\\s*:?",
      "Pai\\s*:?",
      "Cart[aã]o\\s+SUS\\s*:?",
      "CNS\\s*:?",
      "CPF\\s*:?",
      "Telefone\\s*:?",
      "Fone\\s*:?",
      "Celular\\s*:?",
      "(?:Data\\s+de\\s+)?Nascimento\\s*:?",
      "Natureza\\s*:?",
      "Diagn[oó]stico\\s*:?",
      "Ra[cç]a\\s*:?",
      "Sexo\\s*:?"]
  );
  return somenteNome(mae);
}

function extrairNascimento(texto){
  const trecho = extrairEntreRotulos(
    texto,
    ["(?:Data\\s+de\\s+)?Nascimento\\s*:?"],
    ["M[aã]e\\s*:?","Nome\\s+da\\s+M[aã]e\\s*:?","Cart[aã]o\\s*:?","CPF\\s*:?","Sexo\\s*:?","Idade\\s*:?","Telefone\\s*:?","[Óo]bito\\s*:?","Tipo\\s+sang"]
  );
  const m1 = trecho.match(/\b\d{2}\/\d{2}\/\d{4}\b/);
  if(m1) return m1[0];
  const m2 = texto.match(/\b\d{2}\/\d{2}\/\d{4}\b/);
  return m2 ? m2[0] : "";
}

function extrairSUS(texto){
  const trecho = extrairEntreRotulos(
    texto,
    ["Cart[aã]o\\s+SUS\\s*:?","\\bCNS\\s*:?","\\bSUS\\s*:?"],
    ["CPF\\s*:?","Telefone\\s*:?","Fone\\s*:?","Celular\\s*:?","Contato\\s*:?","Natureza\\s*:?","M[eê]dico\\s*:?","Procedimento\\s*:?","Diagn[oó]stico\\s*:?","Data\\s*:?"]
  );
  const soDigitosTrecho = trecho.replace(/\D/g, "");
  if(soDigitosTrecho.length >= 15) return soDigitosTrecho.slice(0, 15);

  const mCNS = texto.match(/CNS\s*:?\s*(\d[\d\s]{13,16}\d)/i);
  if(mCNS){
    const d = mCNS[1].replace(/\D/g,"");
    if(d.length >= 15) return d.slice(0,15);
  }
  const todos = texto.match(/\b\d{15}\b/g);
  return todos ? todos[0] : "";
}

function extrairCPF(texto){
  const m = texto.match(/\b\d{3}\.?\d{3}\.?\d{3}-?\d{2}\b/);
  if(m) return m[0];
  const m2 = texto.match(/\b\d{11}\b/);
  return m2 ? m2[0] : "";
}

function formatarTelefone(digitos){
  digitos = (digitos || "").replace(/\D/g, "");
  if(digitos.length === 11) return `(${digitos.slice(0,2)}) ${digitos.slice(2,7)}-${digitos.slice(7)}`;
  if(digitos.length === 10) return `(${digitos.slice(0,2)}) ${digitos.slice(2,6)}-${digitos.slice(6)}`;
  return digitos;
}

function localizarTelefone(txt){
  if(!txt) return "";
  const padroes = [
    /\b(?:\(?\d{2}\)?\s?)?(?:9\d{4}|\d{4})-?\d{4}\b/g,
    /\b\d{2}\s?9\d{4}-?\d{4}\b/g,
    /\b\d{10,11}\b/g
  ];
  for(const re of padroes){
    const enc = txt.match(re);
    if(enc){
      const d = enc[0].replace(/\D/g,"");
      if(d.length === 10 || d.length === 11) return formatarTelefone(d);
    }
  }
  return "";
}

function extrairTelefone(texto){
  const mTabela = texto.match(/(?:RESIDENCIAL|CELULAR|COMERCIAL|M[Óó]VEL)\s+(\d{2})\s+(\d{7,9})/i);
  if(mTabela){
    return formatarTelefone(mTabela[1] + mTabela[2]);
  }

  const mDDD = texto.match(/\bDDD\s*:?\s*(\d{2})\s+(?:N[uú]mero\s*:?\s*)?(\d{7,9})/i);
  if(mDDD){
    return formatarTelefone(mDDD[1] + mDDD[2]);
  }

  const rotulos = ["Telefone\\s*:?","Fone\\s*:?","Celular\\s*:?","Contato\\s*:?"];
  for(const rotulo of rotulos){
    const trecho = extrairEntreRotulos(
      texto, [rotulo],
      ["Paciente\\s*:?","Nome\\s*:?","Nascimento\\s*:?","M[aã]e\\s*:?","CNS\\s*:?","CPF\\s*:?","Sexo\\s*:?","Natureza\\s*:?"]
    );
    const tel = localizarTelefone(trecho);
    if(tel) return tel;
  }
  return localizarTelefone(texto);
}

    [/\\bSILVIA\\b/g, "SÍLVIA"], [/\\bVALERIA\\b/g, "VALÉRIA"], [/\\bZELIA\\b/g, "ZÉLIA"], [/\\bCECILIA\\b/g, "CECÍLIA"],
    [/\\bMARCIA\\b/g, "MÁRCIA"], [/\\bGLAUCIA\\b/g, "GLÁUCIA"], [/\\bCLAUDIA\\b/g, "CLÁUDIA"], [/\\bCLAUDIO\\b/g, "CLÁUDIO"],
    [/\\bLEA\\b/g, "LÉA"], [/\\bINES\\b/g, "INÊS"], [/\\bANTONIO\\b/g, "ANTÔNIO"], [/\\bANGELA\\b/g, "ÂNGELA"],
    [/\\bMONICA\\b/g, "MÔNICA"], [/\\bSONIA\\b/g, "SÔNIA"], [/\\bVERONICA\\b/g, "VERÔNICA"], [/\\bROSANGELA\\b/g, "ROSÂNGELA"],
    [/\\bARAUJO\\b/g, "ARAÚJO"], [/\\bMAGALHAES\\b/g, "MAGALHÃES"], [/\\bGONCALVES\\b/g, "GONÇALVES"],
    [/\\bNOBREGA\\b/g, "NÓBREGA"], [/\\bGRACA\\b/g, "GRAÇA"]
  ];
  var resultado = nome.toUpperCase();
  for(var i = 0; i < dic.length; i++) resultado = resultado.replace(dic[i][0], dic[i][1]);
  return resultado;
}

function extrairDados(texto){
  return {
    nome: acentuarNome(extrairNomePaciente(texto)),
    nascimento: extrairNascimento(texto),
    mae: acentuarNome(extrairNomeMae(texto)),
    sus: extrairSUS(texto),
    cpf: extrairCPF(texto),
    telefone: extrairTelefone(texto)
  };
}

function normalizarTexto(txt){
  return (txt || "")
    .replace(/\r/g, " ").replace(/\n/g, " ").replace(/\t/g, " ")
    .replace(/[|"'`]/g, " ")
    .replace(/\s{2,}/g, " ")
    .trim();
}

async function extrairTextoOCR(page){
  const viewport = page.getViewport({ scale: 2 });
  const canvas = document.createElement("canvas");
  canvas.width = Math.ceil(viewport.width);
  canvas.height = Math.ceil(viewport.height);
  await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
  const result = await Tesseract.recognize(canvas, "por");
  return result?.data?.text || "";
}

function aplicarImportacaoNaTela(dados){
  campos.nome.value = dados.nome || campos.nome.value;
  campos.nascimento.value = converterDataParaISO(dados.nascimento || '') || campos.nascimento.value;
  campos.sus.value = aplicarMascaraSUS(dados.sus || '');
  campos.telefone.value = aplicarMascaraTelefone(dados.telefone || '');
  salvarRascunho();
}

function abrirSistemaComDadosImportados(dados){
  const pacote = {
    dados: {
      nome: dados.nome || "",
      dataNasc: converterDataParaISO(dados.nascimento || ""),
      nomeMae: dados.mae || "",
      cartaoSus: dados.sus || "",
      cpf: dados.cpf || "",
      tel: dados.telefone || "",
      numExame: "",
      numSerie: "",
      numAno: "",
      unidade: "",
      medicoReq: "",
      dataSolic: "",
      dataEntrada: "",
      dataEmissao: "",
      macro: "",
      micro: "",
      conclusao: "",
      tipoMatCito: "",
      metodologia: "",
      tipoLaudo: "anatomo",
      materiais: [],
      patSelecionado: ""
    },

  };

  salvarRascunho();
  setStatusImportacao('Importação concluída. Revise os campos e clique em “Preencher no Sistema”.');
}

async function iniciarImportacaoDireta(){
  const input = $('arquivoImportacao');
  if(!input) return;
  input.value = '';
  input.click();
}

async function importarPdfDireto(file){
  if(!file) return;
  try{
    setStatusImportacao('Lendo PDF do CADSUS...');
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(buffer) }).promise;
    let textoTotal = "";

    for(let p = 1; p <= pdf.numPages; p++){
      setStatusImportacao(`Lendo página ${p} de ${pdf.numPages}...`);
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      let textoPagina = tc.items.map(i => i.str).join(" ");
      textoPagina = normalizarTexto(textoPagina);

      if(textoPagina.replace(/\s/g, "").length < 30){
        setStatusImportacao(`Página ${p} sem texto. Aplicando OCR...`);
        textoPagina = normalizarTexto(await extrairTextoOCR(page));
      }

      textoTotal += " " + textoPagina;
    }

    textoTotal = normalizarTexto(textoTotal);
    const dados = extrairDados(textoTotal);
    const encontrados = Object.values(dados).filter(Boolean).length;

    if(!encontrados){
      setStatusImportacao('Não consegui extrair dados desse PDF. Você pode preencher manualmente.');
      return;
    }

    aplicarImportacaoNaTela(dados);
    abrirSistemaComDadosImportados(dados);
    setStatusImportacao(`Importando... abrindo o sistema.`);
    setTimeout(() => abrirSistema(), 800);
  }catch(err){
    console.error(err);
    setStatusImportacao('Não foi possível importar esse PDF. Você pode preencher manualmente.');
  }
}
    campos.telefone.addEventListener('input', () => {
      campos.telefone.value = aplicarMascaraTelefone(campos.telefone.value);
      salvarRascunho();
    });
    campos.cep.addEventListener('input', () => {
      campos.cep.value = aplicarMascaraCEP(campos.cep.value);
      salvarRascunho();
    });
    campos.sus.addEventListener('input', () => {
      campos.sus.value = aplicarMascaraSUS(campos.sus.value);
      salvarRascunho();
    });

    Object.values(campos).forEach((el) => {
      if(!el) return;
      el.addEventListener('change', salvarRascunho);
      if (el !== campos.telefone && el !== campos.cep && el !== campos.sus) {
        el.addEventListener('input', salvarRascunho);
      }
    });

    campos.cep.addEventListener('blur', buscarCep);
    $('btnPreencher').addEventListener('click', abrirSistema);
    $('btnImportar').addEventListener('click', iniciarImportacaoDireta);
    $('arquivoImportacao').addEventListener('change', (e) => importarPdfDireto((e.target.files || [])[0]));

    carregarRascunho();
    atualizarNumeroExame();
    importarCadsusSeExistir();
    if(!campos.nome.value.trim()) campos.nome.focus();
  </script>
