<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ely Chaves</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --teal:#0d7778;
      --teal-dark:#0a6667;
      --teal-soft:#dff0ef;
      --gold:#c79a52;
      --bg:#edf3f1;
      --card:#f7f9f8;
      --line:#c7d9d7;
      --text:#1f3d3e;
      --muted:#729394;
      --shadow:0 12px 32px rgba(16,68,69,.10);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'DM Sans',sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#edf3f1 0%, #e9f0ee 100%);
    }
    .topbar{
      background:var(--teal);
      color:#fff;
      min-height:92px;
      border-bottom:3px solid var(--gold);
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 48px;
      gap:20px;
    }
    .brand{display:flex;align-items:center;gap:18px}
    .logo{
      width:42px;height:42px;border-radius:50%;
      background:rgba(255,255,255,.12);
      display:grid;place-items:center;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);
      font-size:22px;
    }
    .brand h1{
      margin:0;
      font-family:'Cormorant Garamond',serif;
      font-size:26px;
      line-height:1;
      font-weight:700;
      letter-spacing:.2px;
    }
    .brand .sub{
      margin-top:4px;
      font-size:12px;
      letter-spacing:1.8px;
      text-transform:uppercase;
      color:rgba(255,255,255,.72);
    }
    .year{
      font-family:'Cormorant Garamond',serif;
      font-size:34px;
      color:rgba(255,255,255,.20);
      font-weight:700;
      letter-spacing:2px;
      user-select:none;
    }
    .page{
      min-height:calc(100% - 92px);
      padding:72px 24px 40px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }
    .panel{
      width:min(980px,100%);
      background:rgba(248,250,249,.92);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:34px 38px 30px;
      backdrop-filter:blur(4px);
    }
    .section-title{
      display:flex;
      align-items:center;
      gap:14px;
      margin:0 0 14px;
      color:var(--teal);
      font-size:13px;
      font-weight:700;
      letter-spacing:2.5px;
      text-transform:uppercase;
    }
    .section-title::after{
      content:"";
      height:1px;
      background:var(--line);
      flex:1;
    }
    .grid{display:grid;gap:14px}
    .grid-top{grid-template-columns:118px 1fr}
    .grid-4{grid-template-columns:repeat(4,1fr)}
    .grid-address-1{grid-template-columns:150px 1fr}
    .grid-address-2{grid-template-columns:1.6fr .55fr}
    .field label{
      display:block;
      margin:0 0 8px;
      font-size:11px;
      font-weight:700;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:#486768;
    }
    .input{
      width:100%;
      height:50px;
      border:1.5px solid #c8dad7;
      border-radius:12px;
      background:#fbfcfc;
      color:var(--text);
      padding:0 16px;
      outline:none;
      font-size:16px;
      transition:border-color .2s, box-shadow .2s, background .2s;
    }
    .input::placeholder{color:#95afb0}
    .input:focus{
      border-color:var(--teal);
      box-shadow:0 0 0 4px rgba(13,119,120,.10);
      background:#fff;
    }
    .input.readonly,
    .input[readonly]{background:#edf6f5;color:#80a0a2}
    .exam-box{
      height:56px;
      border:1.5px solid var(--teal);
      background:#fbfdfd;
      border-radius:12px;
      display:grid;
      place-items:center;
      font-size:20px;
      font-weight:700;
      letter-spacing:4px;
      color:var(--teal);
    }
    .divider{height:1px;background:#d9e6e4;margin:26px 0 4px}
    .actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-top:26px;
      flex-wrap:wrap;
    }
    .actions-left{display:flex;gap:12px;flex-wrap:wrap}
    .btn{
      border:0;
      border-radius:14px;
      height:54px;
      padding:0 24px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-family:inherit;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
      background:linear-gradient(180deg,var(--teal) 0%, var(--teal-dark) 100%);
      color:#fff;
      box-shadow:0 10px 22px rgba(13,119,120,.24);
      min-width:280px;
    }
    .btn-secondary{
      background:#ecf5f4;
      color:var(--teal);
      border:1px solid #c7dddb;
    }
    .helper{
      font-size:13px;
      color:#6d8a8c;
      line-height:1.5;
    }
    .status{
      margin-top:18px;
      border:1px dashed #b6d2cf;
      background:#f3faf9;
      color:#487274;
      border-radius:14px;
      padding:12px 14px;
      font-size:13px;
      display:none;
    }
    .status.show{display:block}
    .hidden{display:none !important}
    @media (max-width:900px){
      .grid-top,.grid-4,.grid-address-1,.grid-address-2{grid-template-columns:1fr}
      .topbar{padding:16px 22px; min-height:auto}
      .year{display:none}
      .panel{padding:24px 18px}
      .btn-primary{min-width:100%}
      .actions{align-items:stretch}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">🧬</div>
      <div>
        <h1>Instituto Dr. Ely Chaves</h1>
        <div class="sub">Registro de novo paciente</div>
      </div>
    </div>
    <div class="year" id="anoTopo">2026</div>
  </header>

  <main class="page">
    <section class="panel">
      <h2 class="section-title">Identificação</h2>

      <div class="grid grid-top">
        <div class="field">
          <label>Nº do Exame</label>
          <div class="exam-box" id="numExame">----</div>
        </div>
        <div class="field">
          <label>Nome completo</label>
          <input class="input" id="nome" type="text" placeholder="Nome completo do paciente" autocomplete="off">
        </div>
      </div>

      <div class="grid grid-4" style="margin-top:14px">
        <div class="field">
          <label>Data de nascimento</label>
          <input class="input" id="nascimento" type="date">
        </div>
        <div class="field">
          <label>Cartão SUS</label>
          <input class="input" id="sus" type="text" placeholder="000 0000 0000 0000" inputmode="numeric" autocomplete="off">
        </div>
        <div class="field">
          <label>Telefone</label>
          <input class="input" id="telefone" type="tel" placeholder="(00) 00000-0000" autocomplete="off">
        </div>
        <div class="field">
          <label>Data da coleta</label>
          <input class="input" id="data_coleta" type="date">
        </div>
      </div>

      <div class="divider"></div>
      <h2 class="section-title" style="margin-top:18px">Endereço</h2>

      <div class="grid grid-address-1">
        <div class="field">
          <label>CEP</label>
          <input class="input" id="cep" type="text" placeholder="00000-000" inputmode="numeric" autocomplete="off">
        </div>
        <div class="field">
          <label>Cidade / UF</label>
          <input class="input readonly" id="cidade" type="text" placeholder="Preenchido via CEP" readonly>
        </div>
      </div>

      <div class="grid grid-address-2" style="margin-top:14px">
        <div class="field">
          <label>Endereço</label>
          <input class="input" id="endereco" type="text" placeholder="Rua — complete com o número" autocomplete="off">
        </div>
        <div class="field">
          <label>Bairro</label>
          <input class="input readonly" id="bairro" type="text" placeholder="Preenchido via CEP" readonly>
        </div>
      </div>

      <div class="status" id="statusMsg"></div>

      <div class="actions">
        <div>
          <div class="helper">Fluxo integrado: importar dados, revisar nesta tela e abrir o sistema principal para a digitação normal do resultado.</div>
        </div>
        <div class="actions-left">
          <input id="arquivoImportacao" class="hidden" type="file" accept=".pdf,application/pdf">
          <button class="btn btn-secondary" id="btnImportar" type="button">📂 Importar</button>
          <button class="btn btn-primary" id="btnPreencher">→ Preencher no Sistema</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const campos = {
      nome: $('nome'),
      nascimento: $('nascimento'),
      sus: $('sus'),
      telefone: $('telefone'),
      data_coleta: $('data_coleta'),
      cep: $('cep'),
      cidade: $('cidade'),
      endereco: $('endereco'),
      bairro: $('bairro')
    };

    $('anoTopo').textContent = new Date().getFullYear();

    function normalizarDataBRParaISO(v){
      if(!v) return '';
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
      const m = String(v).match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      return m ? `${m[3]}-${m[2]}-${m[1]}` : '';
    }

    function apenasDigitos(v){
      return String(v || '').replace(/\D+/g, '');
    }

    function aplicarMascaraTelefone(v){
      const n = apenasDigitos(v).slice(0,11);
      if (n.length <= 10) {
        return n.replace(/^(\d{0,2})(\d{0,4})(\d{0,4}).*/, function(_,a,b,c){
          let s = '';
          if(a) s += '(' + a;
          if(a.length === 2) s += ') ';
          if(b) s += b;
          if(c) s += '-' + c;
          return s;
        });
      }
      return n.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
    }

    function aplicarMascaraCEP(v){
      const n = apenasDigitos(v).slice(0,8);
      return n.replace(/^(\d{5})(\d{0,3}).*/, function(_,a,b){ return b ? `${a}-${b}` : a; });
    }

    function aplicarMascaraSUS(v){
      const n = apenasDigitos(v).slice(0,15);
      return n.replace(/(\d{3})(?=\d)/g, '$1 ').trim();
    }

    function salvarRascunho(){
      const dados = {
        nome: campos.nome.value.trim(),
        nascimento: campos.nascimento.value,
        sus: campos.sus.value.trim(),
        telefone: campos.telefone.value.trim(),
        data_coleta: campos.data_coleta.value,
        cep: campos.cep.value.trim(),
        cidade: campos.cidade.value.trim(),
        endereco: campos.endereco.value.trim(),
        bairro: campos.bairro.value.trim()
      };
      localStorage.setItem('ely_tela_principal_rascunho', JSON.stringify(dados));
    }

    function carregarRascunho(){
      try {
        const bruto = localStorage.getItem('ely_tela_principal_rascunho');
        if(!bruto) return;
        const dados = JSON.parse(bruto);
        Object.keys(dados || {}).forEach((k) => {
          if (campos[k] && !campos[k].value) campos[k].value = dados[k] || '';
        });
      } catch(e) {}
    }

    function exibirStatus(msg){
      const box = $('statusMsg');
      box.textContent = msg;
      box.classList.add('show');
    }

    async function buscarCep(){
      const cep = apenasDigitos(campos.cep.value);
      if(cep.length !== 8) return;
      try{
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const json = await res.json();
        if(json.erro){
          exibirStatus('CEP não encontrado. Você pode continuar preenchendo manualmente.');
          return;
        }
        campos.cidade.value = [json.localidade, json.uf].filter(Boolean).join(' / ');
        campos.bairro.value = json.bairro || '';
        if(!campos.endereco.value) campos.endereco.value = json.logradouro || '';
        salvarRascunho();
      }catch(err){
        exibirStatus('Não foi possível consultar o CEP agora. Você pode continuar normalmente.');
      }
    }

    function atualizarNumeroExame(){
      const anoAtual = String(new Date().getFullYear());
      let seq = '0001';
      try{
        const bruto = localStorage.getItem('ely_seq_num');
        const ano = localStorage.getItem('ely_seq_ano');
        if(bruto && ano === anoAtual) seq = String(bruto).padStart(4, '0');
      }catch(e){}
      $('numExame').textContent = seq;
    }

    function importarCadsusSeExistir(){
      const bruto = localStorage.getItem('cadsus_pendente');
      if(!bruto) return;
      try{
        const pacote = JSON.parse(bruto);
        const dados = pacote && pacote.dados ? pacote.dados : pacote;
        if(!dados) return;
        campos.nome.value = dados.nome || campos.nome.value;
        campos.nascimento.value = normalizarDataBRParaISO(dados.nascimento || dados.dataNasc || campos.nascimento.value);
        campos.sus.value = dados.cartaoSus || dados.sus || campos.sus.value;
        campos.telefone.value = aplicarMascaraTelefone(dados.tel || dados.telefone || campos.telefone.value);
        exibirStatus('Dados importados. Revise e clique em “Preencher no Sistema”.');
        salvarRascunho();
      }catch(e){ }
    }

    function montarPacoteParaSistema(){
      return {
        dados: {
          nome: campos.nome.value.trim(),
          nascimento: campos.nascimento.value,
          cartaoSus: campos.sus.value.trim(),
          telefone: campos.telefone.value.trim(),
          cep: campos.cep.value.trim(),
          cidade: campos.cidade.value.trim(),
          endereco: campos.endereco.value.trim(),
          bairro: campos.bairro.value.trim(),
          data_coleta: campos.data_coleta.value
        },
        origem: 'tela_principal_ely',
        geradoEm: new Date().toISOString()
      };
    }

    function abrirSistema(){
      localStorage.setItem('cadsus_pendente', JSON.stringify(montarPacoteParaSistema()));
      salvarRascunho();
      window.location.href = 'ely_chaves_sistema.html';
    }


    async function iniciarImportacaoDireta(){
      const input = $('arquivoImportacao');
      if(!input) return;
      input.value = '';
      input.click();
    }

    async function prepararArquivoEIrParaExtrator(file){
      if(!file) return;
      try{
        exibirStatus('Arquivo selecionado. Abrindo importação...');
        const buffer = await file.arrayBuffer();
        const bytes = new Uint8Array(buffer);
        let binary = '';
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
        }
        const base64 = btoa(binary);
        sessionStorage.setItem('ely_importacao_direta_pdf', JSON.stringify({
          nome: file.name || 'arquivo.pdf',
          tipo: file.type || 'application/pdf',
          tamanho: file.size || 0,
          conteudoBase64: base64,
          geradoEm: new Date().toISOString(),
          origem: 'tela_principal_ely'
        }));
        window.location.href = 'extrator_cadsus_definitivo_v3_corrigido.html?autoimport=1';
      }catch(err){
        exibirStatus('Não foi possível preparar o arquivo para importação direta.');
      }
    }

    campos.telefone.addEventListener('input', () => {
      campos.telefone.value = aplicarMascaraTelefone(campos.telefone.value);
      salvarRascunho();
    });
    campos.cep.addEventListener('input', () => {
      campos.cep.value = aplicarMascaraCEP(campos.cep.value);
      salvarRascunho();
    });
    campos.sus.addEventListener('input', () => {
      campos.sus.value = aplicarMascaraSUS(campos.sus.value);
      salvarRascunho();
    });

    Object.values(campos).forEach((el) => {
      if(!el) return;
      el.addEventListener('change', salvarRascunho);
      if (el !== campos.telefone && el !== campos.cep && el !== campos.sus) {
        el.addEventListener('input', salvarRascunho);
      }
    });

    campos.cep.addEventListener('blur', buscarCep);
    $('btnPreencher').addEventListener('click', abrirSistema);
    $('btnImportar').addEventListener('click', iniciarImportacaoDireta);
    $('arquivoImportacao').addEventListener('change', (e) => prepararArquivoEIrParaExtrator((e.target.files || [])[0]));

    carregarRascunho();
    atualizarNumeroExame();
    importarCadsusSeExistir();
  </script>
</body>
</html>
