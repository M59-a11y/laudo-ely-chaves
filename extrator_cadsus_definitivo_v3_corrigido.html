<head>

  <style>
    :root{
      --teal:#0d7778;
      --teal-dark:#0a6667;
      --teal-soft:#dff0ef;
      --gold:#c79a52;
      --bg:#edf3f1;

      --text:#1f3d3e;

      --shadow:0 12px 32px rgba(16,68,69,.10);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'DM Sans',sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#edf3f1 0%, #e9f0ee 100%);
    }
    .topbar{
      background:var(--teal);
      color:#fff;
      min-height:92px;
      border-bottom:3px solid var(--gold);
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 48px;
      gap:20px;
    }
    .brand{display:flex;align-items:center;gap:18px}
    .logo{
      width:42px;height:42px;border-radius:50%;
      background:rgba(255,255,255,.12);
      display:grid;place-items:center;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);
      font-size:22px;
    }
    .brand h1{
      margin:0;
      font-family:'Cormorant Garamond',serif;
      font-size:26px;
      line-height:1;
      font-weight:700;
      letter-spacing:.2px;

    .brand .sub{
      margin-top:4px;

    .year{
      font-family:'Cormorant Garamond',serif;
      font-size:34px;
      color:rgba(255,255,255,.20);
      font-weight:700;
      letter-spacing:2px;
      user-select:none;
    }
    .page{
      min-height:calc(100% - 92px);
      padding:72px 24px 40px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }
    .panel{
      width:min(980px,100%);
      background:rgba(248,250,249,.92);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:34px 38px 30px;
      backdrop-filter:blur(4px);
    }
    .section-title{
      display:flex;
      align-items:center;
      gap:14px;
      margin:0 0 14px;
      color:var(--teal);
      font-size:13px;
      font-weight:700;
      letter-spacing:2.5px;
      text-transform:uppercase;
    }
    .section-title::after{
      content:"";
      height:1px;
      background:var(--line);
      flex:1;
    }
    .grid{display:grid;gap:14px}
    .grid-top{grid-template-columns:118px 1fr}
    .grid-4{grid-template-columns:repeat(4,1fr)}
    .grid-address-1{grid-template-columns:150px 1fr}
    .grid-address-2{grid-template-columns:1.6fr .55fr}
    .field label{
      display:block;
      margin:0 0 8px;
      font-size:11px;
      font-weight:700;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:#486768;
    }
    .input{
      width:100%;
      height:50px;
      border:1.5px solid #c8dad7;
      border-radius:12px;
      background:#fbfcfc;
      color:var(--text);
      padding:0 16px;
      outline:none;
      font-size:16px;
      transition:border-color .2s, box-shadow .2s, background .2s;
    }
    .input::placeholder{color:#95afb0}
    .input:focus{
      border-color:var(--teal);
      box-shadow:0 0 0 4px rgba(13,119,120,.10);
      background:#fff;
    }
    .input.readonly,
    .input[readonly]{background:#edf6f5;color:#80a0a2}
    .exam-box{
      height:56px;
      border:1.5px solid var(--teal);
      background:#fbfdfd;
      border-radius:12px;
      display:grid;
      place-items:center;
      font-size:20px;
      font-weight:700;
      letter-spacing:4px;
      color:var(--teal);
    }
    .divider{height:1px;background:#d9e6e4;margin:26px 0 4px}
    .actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-top:26px;
      flex-wrap:wrap;
    }
    .actions-left{display:flex;gap:12px;flex-wrap:wrap}
    .btn{
      border:0;
      border-radius:14px;
      height:54px;
      padding:0 24px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-family:inherit;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
      background:linear-gradient(180deg,var(--teal) 0%, var(--teal-dark) 100%);
      color:#fff;
      box-shadow:0 10px 22px rgba(13,119,120,.24);
      min-width:280px;
    }
    .btn-secondary{
      background:#ecf5f4;
      color:var(--teal);
      border:1px solid #c7dddb;
    }
    .helper{
      font-size:13px;
      color:#6d8a8c;
      line-height:1.5;
    }
    .status{
      margin-top:18px;
      border:1px dashed #b6d2cf;
      background:#f3faf9;
      color:#487274;
      border-radius:14px;
      padding:12px 14px;
      font-size:13px;
      display:none;
    }
    .status.show{display:block}
    .hidden{display:none !important}
    @media (max-width:900px){
      .grid-top,.grid-4,.grid-address-1,.grid-address-2{grid-template-columns:1fr}
      .topbar{padding:16px 22px; min-height:auto}
      .year{display:none}
      .panel{padding:24px 18px}
      .btn-primary{min-width:100%}
      .actions{align-items:stretch}
    }

  <script>
    const $ = (id) => document.getElementById(id);
    const campos = {
      nome: $('nome'),
      nascimento: $('nascimento'),
      sus: $('sus'),
      telefone: $('telefone'),
      data_coleta: $('data_coleta'),
      cep: $('cep'),
      cidade: $('cidade'),
      endereco: $('endereco'),
      bairro: $('bairro')
    };

    $('anoTopo').textContent = new Date().getFullYear();

    function normalizarDataBRParaISO(v){
      if(!v) return '';
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
      const m = String(v).match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      return m ? `${m[3]}-${m[2]}-${m[1]}` : '';
    }

    function apenasDigitos(v){
      return String(v || '').replace(/\D+/g, '');
    }

    function aplicarMascaraTelefone(v){
      const n = apenasDigitos(v).slice(0,11);
      if (n.length <= 10) {
        return n.replace(/^(\d{0,2})(\d{0,4})(\d{0,4}).*/, function(_,a,b,c){
          let s = '';
          if(a) s += '(' + a;
          if(a.length === 2) s += ') ';
          if(b) s += b;
          if(c) s += '-' + c;
          return s;
        });
      }
      return n.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
    }

    function aplicarMascaraCEP(v){
      const n = apenasDigitos(v).slice(0,8);
      return n.replace(/^(\d{5})(\d{0,3}).*/, function(_,a,b){ return b ? `${a}-${b}` : a; });
    }

    function aplicarMascaraSUS(v){
      const n = apenasDigitos(v).slice(0,15);
      return n.replace(/(\d{3})(?=\d)/g, '$1 ').trim();
    }

    function salvarRascunho(){
      const dados = {
        nome: campos.nome.value.trim(),
        nascimento: campos.nascimento.value,
        sus: campos.sus.value.trim(),
        telefone: campos.telefone.value.trim(),
        data_coleta: campos.data_coleta.value,
        cep: campos.cep.value.trim(),
        cidade: campos.cidade.value.trim(),
        endereco: campos.endereco.value.trim(),
        bairro: campos.bairro.value.trim()
      };
      localStorage.setItem('ely_tela_principal_rascunho', JSON.stringify(dados));
    }

    function carregarRascunho(){
      try {
        const bruto = localStorage.getItem('ely_tela_principal_rascunho');
        if(!bruto) return;
        const dados = JSON.parse(bruto);
        Object.keys(dados || {}).forEach((k) => {
          if (campos[k] && !campos[k].value) campos[k].value = dados[k] || '';
        });
      } catch(e) {}
    }

    function exibirStatus(msg){
      const box = $('statusMsg');
      box.textContent = msg;
      box.classList.add('show');
    }

    async function buscarCep(){
      const cep = apenasDigitos(campos.cep.value);
      if(cep.length !== 8) return;
      try{
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const json = await res.json();
        if(json.erro){
          exibirStatus('CEP nГЈo encontrado. VocГЄ pode continuar preenchendo manualmente.');
          return;
        }
        campos.cidade.value = [json.localidade, json.uf].filter(Boolean).join(' / ');
        campos.bairro.value = json.bairro || '';
        if(!campos.endereco.value) campos.endereco.value = json.logradouro || '';
        salvarRascunho();
      }catch(err){
        exibirStatus('NГЈo foi possГ­vel consultar o CEP agora. VocГЄ pode continuar normalmente.');
      }
    }

    function atualizarNumeroExame(){
      const anoAtual = String(new Date().getFullYear());
      let seq = '0001';
      try{
        const bruto = localStorage.getItem('ely_seq_num');
        const ano = localStorage.getItem('ely_seq_ano');
        if(bruto && ano === anoAtual) seq = String(bruto).padStart(4, '0');
      }catch(e){}
      $('numExame').textContent = seq;
    }

    function importarCadsusSeExistir(){
      const bruto = localStorage.getItem('cadsus_pendente');
      if(!bruto) return;
      try{
        const pacote = JSON.parse(bruto);
        const dados = pacote && pacote.dados ? pacote.dados : pacote;
        if(!dados) return;
        campos.nome.value = dados.nome || campos.nome.value;
        campos.nascimento.value = normalizarDataBRParaISO(dados.nascimento || dados.dataNasc || campos.nascimento.value);
        campos.sus.value = dados.cartaoSus || dados.sus || campos.sus.value;
        campos.telefone.value = aplicarMascaraTelefone(dados.tel || dados.telefone || campos.telefone.value);
        exibirStatus('Dados importados. Revise e clique em вЂњPreencher no SistemaвЂќ.');
        salvarRascunho();
      }catch(e){ }
    }

    function montarPacoteParaSistema(){
      return {
        dados: {
          nome: campos.nome.value.trim(),
          nascimento: campos.nascimento.value,
          cartaoSus: campos.sus.value.trim(),
          telefone: campos.telefone.value.trim(),
          cep: campos.cep.value.trim(),
          cidade: campos.cidade.value.trim(),
          endereco: campos.endereco.value.trim(),
          bairro: campos.bairro.value.trim(),
          data_coleta: campos.data_coleta.value
        },
        origem: 'tela_principal_ely',
        geradoEm: new Date().toISOString()
      };
    }


function abrirSistema(){
  localStorage.setItem('cadsus_pendente', JSON.stringify(montarPacoteParaSistema()));
  salvarRascunho();
  window.location.href = 'ely_chaves_sistema.html';
}

function converterDataParaISO(data){
  if(!data) return "";
  var p = String(data).match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(!p) return data;
  return p[3] + "-" + p[2] + "-" + p[1];
}

function limparValor(v){
  return (v || "")
    .replace(/\s{2,}/g, " ")
    .replace(/^[\s:;\-вЂ“вЂ”|]+/, "")
    .replace(/[\s:;\-вЂ“вЂ”|]+$/, "")
    .trim();
}

function removerLixoFim(v){
  return (v || "")
    .replace(/\b(Idade|Sexo|Feminino|Masculino|Cart[aГЈ]o|CPF|CNS|SUS|Data\s+de\s+Nascimento|Telefone|Fone|Celular|Contato|M[eГЄ]dico|Procedimento|Quantidade|Natureza|Exame|Nome\s+social|Nome\s+do\s+Pai|Ra[cГ§]a|Etnia|Nacionalidade|Pa[iГ­]s)\b.*$/i, "")
    .replace(/\s{2,}/g, " ")
    .trim();
}

function somenteNome(v){
  v = limparValor(v);
  v = removerLixoFim(v);
  v = v.replace(/[^A-Za-zГЂ-Гї\s]/g, " ").replace(/\s{2,}/g, " ").trim();
  return v;
}

function extrairEntreRotulos(texto, rotulosInicio, rotulosFim){
  for(const ini of rotulosInicio){
    const mIni = new RegExp(ini, "i").exec(texto);
    if(!mIni) continue;
    const restante = texto.slice(mIni.index + mIni[0].length);
    let menorFim = restante.length;
    for(const fim of rotulosFim){
      const mFim = new RegExp(fim, "i").exec(restante);
      if(mFim && mFim.index < menorFim) menorFim = mFim.index;
    }
    const valor = restante.slice(0, menorFim);
    if(valor && valor.trim()) return limparValor(valor);
  }
  return "";
}

function extrairNomePaciente(texto){
  let nome = extrairEntreRotulos(
    texto,
    [
      "\\bNome\\s*:(?!\\s*(?:Social|da\\s*M[aГЈ]e|do\\s*Pai|do\\s*Paciente|Logradouro))",
      "Nome\\s+do\\s+Paciente\\s*:?",
      "Paciente\\s*:?",
      "Usu[aГЎ]rio\\s*:?"
    ],
    [
      "Nome\\s+Social\\s*:?",
      "Nome\\s+da\\s+M[aГЈ]e\\s*:?",
      "Nome\\s+do\\s+Pai\\s*:?",
      "(?:Data\\s+de\\s+)?Nascimento\\s*:",
      "CNS\\s*:?",
      "CPF\\s*:?",
      "Sexo\\s*:?",
      "Idade\\s*:?",
      "M[aГЈ]e\\s*:?",
      "Cart[aГЈ]o\\s+SUS\\s*:?",
      "Telefone\\s*:?",
      "Fone\\s*:?",
      "Celular\\s*:?",
      "Ra[cГ§]a\\s*:?",
      "Etnia\\s*:?",
      "Naturaliza"
    ]
  );

  nome = somenteNome(nome);
  if(nome && nome.split(" ").filter(Boolean).length >= 2) return nome;

  const m = texto.match(/\bNome\s*:\s*([A-ZГЂГЃГ‚ГѓГ„Г…Г€Г‰ГЉГ‹ГЊГЌГЋГЏГ’Г“Г”Г•Г–Г™ГљГ›ГњГќЕё][A-ZГЂ-Гїa-z\s]{3,}?)(?=\s+(?:Nome\s+Social|CNS|CPF|Nascimento|Sexo|Ra[cГ§]a|Naturaliz|Nome\s+da\s+M[aГЈ]e|Nome\s+do\s+Pai))/i);
  if(m){
    const n = somenteNome(m[1]);
    if(n) return n;
  }
  return nome;
}

function extrairNomeMae(texto){
  let mae = extrairEntreRotulos(
    texto,
    ["Nome\\s+da\\s+M[aГЈ]e\\s*:?", "M[aГЈ]e\\s*:?"],
    [
      "Nome\\s+do\\s+Pai\\s*:?",
      "Pai\\s*:?",
      "Cart[aГЈ]o\\s+SUS\\s*:?",
      "CNS\\s*:?",
      "CPF\\s*:?",
      "Telefone\\s*:?",
      "Fone\\s*:?",
      "Celular\\s*:?",
      "(?:Data\\s+de\\s+)?Nascimento\\s*:",
      "Natureza\\s*:?",
      "Diagn[oГі]stico\\s*:?",
      "Ra[cГ§]a\\s*:?",
      "Sexo\\s*:?"]
  );
  return somenteNome(mae);
}

function extrairNascimento(texto){
  const trecho = extrairEntreRotulos(
    texto,
    ["(?:Data\\s+de\\s+)?Nascimento\\s*:?"],
    ["M[aГЈ]e\\s*:?","Nome\\s+da\\s+M[aГЈ]e\\s*:?","Cart[aГЈ]o\\s*:?","CPF\\s*:?","Sexo\\s*:?","Idade\\s*:?","Telefone\\s*:?","[Г“o]bito\\s*:?","Tipo\\s+sang"]
  );
  const m1 = trecho.match(/\b\d{2}\/\d{2}\/\d{4}\b/);
  if(m1) return m1[0];
  const m2 = texto.match(/\b\d{2}\/\d{2}\/\d{4}\b/);
  return m2 ? m2[0] : "";
}

function extrairSUS(texto){
  const trecho = extrairEntreRotulos(
    texto,
    ["Cart[aГЈ]o\\s+SUS\\s*:?","\\bCNS\\s*:?","\\bSUS\\s*:?"],
    ["CPF\\s*:?","Telefone\\s*:?","Fone\\s*:?","Celular\\s*:?","Contato\\s*:?","Natureza\\s*:?","M[eГЄ]dico\\s*:?","Procedimento\\s*:?","Diagn[oГі]stico\\s*:?","Data\\s*:?"]
  );
  const soDigitosTrecho = trecho.replace(/\D/g, "");
  if(soDigitosTrecho.length >= 15) return soDigitosTrecho.slice(0, 15);

  const mCNS = texto.match(/CNS\s*:?\s*(\d[\d\s]{13,16}\d)/i);
  if(mCNS){
    const d = mCNS[1].replace(/\D/g,"");
    if(d.length >= 15) return d.slice(0,15);
  }
  const todos = texto.match(/\b\d{15}\b/g);
  return todos ? todos[0] : "";
}

function extrairCPF(texto){
  const m = texto.match(/\b\d{3}\.?\d{3}\.?\d{3}-?\d{2}\b/);
  if(m) return m[0];
  const m2 = texto.match(/\b\d{11}\b/);
  return m2 ? m2[0] : "";
}

function formatarTelefone(digitos){
  digitos = (digitos || "").replace(/\D/g, "");
  if(digitos.length === 11) return `(${digitos.slice(0,2)}) ${digitos.slice(2,7)}-${digitos.slice(7)}`;
  if(digitos.length === 10) return `(${digitos.slice(0,2)}) ${digitos.slice(2,6)}-${digitos.slice(6)}`;
  return digitos;
}

function localizarTelefone(txt){
  if(!txt) return "";
  const padroes = [
    /\b(?:\(?\d{2}\)?\s?)?(?:9\d{4}|\d{4})-?\d{4}\b/g,
    /\b\d{2}\s?9\d{4}-?\d{4}\b/g,
    /\b\d{10,11}\b/g
  ];
  for(const re of padroes){
    const enc = txt.match(re);
    if(enc){
      const d = enc[0].replace(/\D/g,"");
      if(d.length === 10 || d.length === 11) return formatarTelefone(d);
    }
  }
  return "";
}

function extrairTelefone(texto){
  const mTabela = texto.match(/(?:RESIDENCIAL|CELULAR|COMERCIAL|M[Г“Гі]VEL)\s+(\d{2})\s+(\d{7,9})/i);
  if(mTabela){
    return formatarTelefone(mTabela[1] + mTabela[2]);
  }

  const mDDD = texto.match(/\bDDD\s*:?\s*(\d{2})\s+(?:N[uГє]mero\s*:?\s*)?(\d{7,9})/i);
  if(mDDD){
    return formatarTelefone(mDDD[1] + mDDD[2]);
  }

  const rotulos = ["Telefone\\s*:?","Fone\\s*:?","Celular\\s*:?","Contato\\s*:?"];
  for(const rotulo of rotulos){
    const trecho = extrairEntreRotulos(
      texto, [rotulo],
      ["Paciente\\s*:?","Nome\\s*:?","Nascimento\\s*:?","M[aГЈ]e\\s*:?","CNS\\s*:?","CPF\\s*:?","Sexo\\s*:?","Natureza\\s*:?"]
    );
    const tel = localizarTelefone(trecho);
    if(tel) return tel;
  }
  return localizarTelefone(texto);
}

function extrairDados(texto){
  return {
    nome: acentuarNome(extrairNomePaciente(texto)),
    nascimento: extrairNascimento(texto),
    mae: acentuarNome(extrairNomeMae(texto)),
    sus: extrairSUS(texto),
    cpf: extrairCPF(texto),
    telefone: extrairTelefone(texto)
  };
}

function normalizarTexto(txt){
  return (txt || "")
    .replace(/\r/g, " ").replace(/\n/g, " ").replace(/\t/g, " ")
    .replace(/[|"'`]/g, " ")
    .replace(/\s{2,}/g, " ")
    .trim();
}

async function extrairTextoOCR(page){
  const viewport = page.getViewport({ scale: 2 });
  const canvas = document.createElement("canvas");
  canvas.width = Math.ceil(viewport.width);
  canvas.height = Math.ceil(viewport.height);
  await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
  const result = await Tesseract.recognize(canvas, "por");
  return result?.data?.text || "";
}

async function iniciarImportacaoDireta(){

}

async function importarPdfDireto(file){
  if(!file) return;
  try{
    setStatusImportacao('Lendo PDF do CADSUS...');
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(buffer) }).promise;
    let textoTotal = "";

    for(let p = 1; p <= pdf.numPages; p++){
      setStatusImportacao(`Lendo pГЎgina ${p} de ${pdf.numPages}...`);
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      let textoPagina = tc.items.map(i => i.str).join(" ");
      textoPagina = normalizarTexto(textoPagina);

      if(textoPagina.replace(/\s/g, "").length < 30){
        setStatusImportacao(`PГЎgina ${p} sem texto. Aplicando OCR...`);
        textoPagina = normalizarTexto(await extrairTextoOCR(page));
      }

      textoTotal += " " + textoPagina;
    }

    textoTotal = normalizarTexto(textoTotal);
    const dados = extrairDados(textoTotal);
    const encontrados = Object.values(dados).filter(Boolean).length;

    if(!encontrados){
      setStatusImportacao('NГЈo consegui extrair dados desse PDF. VocГЄ pode preencher manualmente.');
      return;
    }

    aplicarImportacaoNaTela(dados);
    setStatusImportacao(`ImportaГ§ГЈo concluГ­da com ${encontrados} campo(s). Abrindo o sistema...`);
    abrirSistemaComDadosImportados(dados);
  }catch(err){
    console.error(err);
    setStatusImportacao('NГЈo foi possГ­vel importar esse PDF. VocГЄ pode preencher manualmente.');
  }
}
